name = "equation-677-database"
main = "src/index.js"
account_id = "641ee17fdc075e1c2f3b2cfc7ffdea81"
compatibility_date = "2026-04-23"

routes = [
  { pattern = "eq677.icarm.cloud", custom_domain = true }
]

[assets]
directory = "./public"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "icarm-eq677"

[[d1_databases]]
binding = "DB"
database_name = "eq677"
database_id = "ec51881d-d094-41b9-b5ac-ed671f85b268"
migrations_dir = "migrations"

[[containers]]
class_name = "Canonicalizer"
# Built and pushed by .github/workflows/container.yml into the CF managed registry.
image = "registry.cloudflare.com/641ee17fdc075e1c2f3b2cfc7ffdea81/eq677-canonicalizer:latest"
max_instances = 5

[[durable_objects.bindings]]
name = "CANONICALIZER"
class_name = "Canonicalizer"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["Canonicalizer"]
