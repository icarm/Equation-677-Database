name: Build canonicalizer container

on:
  push:
    branches: [main]
    paths:
      - 'container/**'
      - '.github/workflows/container.yml'
  workflow_dispatch:

env:
  IMAGE_NAME: eq677-canonicalizer
  CLOUDFLARE_ACCOUNT_ID: 641ee17fdc075e1c2f3b2cfc7ffdea81

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build amd64 image into local daemon
        uses: docker/build-push-action@v5
        with:
          context: ./container
          platforms: linux/amd64
          load: true
          tags: ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push to Cloudflare managed registry
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx --yes wrangler@4 containers push ${IMAGE_NAME}:sha-${GITHUB_SHA}
